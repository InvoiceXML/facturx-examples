<!DOCTYPE html>
<meta charset="utf-8">
<title>AI Convert PDF to Factur-X with InvoiceXML API</title>
<!--
  Experimental: convert a plain PDF invoice to Factur-X using AI.
  Review the output manually before sending to a customer or tax authority.

  Get API key: https://www.invoicexml.com/account/authentication
  Docs:        https://www.invoicexml.com/docs/api/transform/to/facturx

  WARNING: do not ship API keys in production browser code. Proxy through
  your own backend so the key stays server-side.
-->

<h1>Convert PDF to Factur-X (AI, experimental)</h1>
<input type="file" id="file" accept="application/pdf">
<button id="run">Convert</button>
<p id="status"></p>

<script>
const apiKey = 'YOUR_API_KEY';

document.getElementById('run').addEventListener('click', async () => {
    const file = document.getElementById('file').files[0];
    if (!file) return alert('Choose a PDF first.');
    const status = document.getElementById('status');
    status.textContent = 'Converting (this may take 10-30 seconds)...';

    const form = new FormData();
    form.append('file', file);
    form.append('version',  '2.3.2');
    form.append('profile',  'extended');
    form.append('syntax',   'cii');
    form.append('embed',    'true');
    form.append('language', 'en');

    const response = await fetch('https://api.invoicexml.com/v1/transform/to/facturx', {
        method: 'POST',
        headers: { Authorization: 'Bearer ' + apiKey },
        body: form,
    });

    if (!response.ok) {
        status.textContent = `InvoiceXML API error ${response.status}: ${await response.text()}`;
        return;
    }

    const blob = await response.blob();
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = 'converted-facturx.pdf';
    a.click();
    status.textContent = `Downloaded converted-facturx.pdf (${blob.size} bytes). Review manually before sending.`;
});
</script>
